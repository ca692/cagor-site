backend:
  name: github
  repo: ca692/cagor-site
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

locale: 'fr'

collections:
  - name: "news"
    label: "Actualités"
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre (FR)", name: "title_fr", widget: "string"}
      - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
      - {label: "Date", name: "date", widget: "datetime", format: "DD MMMM YYYY", date_format: "DD MMMM YYYY", time_format: false}
      - {label: "Icône FontAwesome", name: "icon", widget: "select", options: ["fas fa-star", "fas fa-handshake", "fas fa-seedling", "fas fa-trophy", "fas fa-bullhorn", "fas fa-calendar", "fas fa-users", "fas fa-leaf", "fas fa-graduation-cap", "fas fa-chart-line"], default: "fas fa-star"}
      - {label: "Résumé (FR)", name: "summary_fr", widget: "text"}
      - {label: "Résumé (AR)", name: "summary_ar", widget: "text", required: false}

  - name: "settings"
    label: "Paramètres du site"
    files:
      - label: "Informations de contact"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - {label: "Adresse (FR)", name: "address_fr", widget: "string"}
          - {label: "Adresse (AR)", name: "address_ar", widget: "string", required: false}
          - {label: "Téléphone 1", name: "phone1", widget: "string"}
          - {label: "Téléphone 2", name: "phone2", widget: "string"}
          - {label: "Email 1", name: "email1", widget: "string"}
          - {label: "Email 2", name: "email2", widget: "string"}
          - {label: "Horaires (FR)", name: "hours_fr", widget: "string"}
          - {label: "Horaires (AR)", name: "hours_ar", widget: "string", required: false}
          - {label: "Lien Facebook", name: "facebook", widget: "string"}
          - {label: "URL Google Maps", name: "maps_url", widget: "string"}

      - label: "Textes de la page d'accueil"
        name: "homepage"
        file: "_data/homepage.json"
        fields:
          - label: "Section Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Titre principal (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre principal (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Bouton 1 (FR)", name: "btn1_fr", widget: "string"}
              - {label: "Bouton 2 (FR)", name: "btn2_fr", widget: "string"}
          - label: "Section À propos"
            name: "about"
            widget: "object"
            fields:
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Paragraphe 1 (FR)", name: "p1_fr", widget: "text"}
              - {label: "Paragraphe 1 (AR)", name: "p1_ar", widget: "text", required: false}
              - {label: "Paragraphe 2 (FR)", name: "p2_fr", widget: "text"}
              - {label: "Paragraphe 2 (AR)", name: "p2_ar", widget: "text", required: false}
              - {label: "Paragraphe 3 (FR)", name: "p3_fr", widget: "text"}
              - {label: "Paragraphe 3 (AR)", name: "p3_ar", widget: "text", required: false}

      - label: "Services"
        name: "services"
        file: "_data/services.json"
        fields:
          - {label: "Titre de section (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre de section (AR)", name: "section_title_ar", widget: "string", required: false}
          - label: "Cartes de services"
            name: "items"
            widget: "list"
            fields:
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "text"}
              - {label: "Description (AR)", name: "description_ar", widget: "text", required: false}
              - {label: "Lien", name: "link", widget: "string"}

      - label: "Missions"
        name: "missions"
        file: "_data/missions.json"
        fields:
          - {label: "Titre de section (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre de section (AR)", name: "section_title_ar", widget: "string", required: false}
          - label: "Liste des missions"
            name: "items"
            widget: "list"
            fields:
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "text"}
              - {label: "Description (AR)", name: "description_ar", widget: "text", required: false}

      - label: "Plan Stratégique"
        name: "plan"
        file: "_data/plan.json"
        fields:
          - {label: "Titre de section (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre de section (AR)", name: "section_title_ar", widget: "string", required: false}
          - {label: "Introduction (FR)", name: "intro_fr", widget: "text"}
          - {label: "Introduction (AR)", name: "intro_ar", widget: "text", required: false}
          - label: "Axes stratégiques"
            name: "axes"
            widget: "list"
            fields:
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "text"}
              - {label: "Description (AR)", name: "description_ar", widget: "text", required: false}

      - label: "Organisation"
        name: "organisation"
        file: "_data/organisation.json"
        fields:
          - {label: "Titre de section (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre de section (AR)", name: "section_title_ar", widget: "string", required: false}
          - {label: "Introduction (FR)", name: "intro_fr", widget: "text"}
          - {label: "Introduction (AR)", name: "intro_ar", widget: "text", required: false}
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "text"}
              - {label: "Description (AR)", name: "description_ar", widget: "text", required: false}
          - label: "Annexes"
            name: "annexes"
            widget: "list"
            fields:
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "string"}
              - {label: "Description (AR)", name: "description_ar", widget: "string", required: false}

      - label: "Vulgarisation"
        name: "vulgarisation"
        file: "_data/vulgarisation.json"
        fields:
          - {label: "Titre de section (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre de section (AR)", name: "section_title_ar", widget: "string", required: false}
          - {label: "Introduction (FR)", name: "intro_fr", widget: "text"}
          - {label: "Introduction (AR)", name: "intro_ar", widget: "text", required: false}
          - label: "Cartes principales"
            name: "cards"
            widget: "list"
            fields:
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "text"}
              - {label: "Description (AR)", name: "description_ar", widget: "text", required: false}
          - label: "Thèmes de vulgarisation"
            name: "topics"
            widget: "list"
            fields:
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "text"}
              - {label: "Description (AR)", name: "description_ar", widget: "text", required: false}

      - label: "Formation"
        name: "formation"
        file: "_data/formation.json"
        fields:
          - {label: "Titre de section (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre de section (AR)", name: "section_title_ar", widget: "string", required: false}
          - label: "Chaînes de production"
            name: "chaines"
            widget: "list"
            field: {label: "Nom", name: "nom", widget: "string"}
          - label: "Cartes de formation"
            name: "cards"
            widget: "list"
            fields:
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
              - {label: "Titre (FR)", name: "title_fr", widget: "string"}
              - {label: "Titre (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "Description (FR)", name: "description_fr", widget: "text"}
              - {label: "Description (AR)", name: "description_ar", widget: "text", required: false}
              - {label: "Texte du lien (FR)", name: "link_text_fr", widget: "string"}
              - {label: "URL du lien", name: "link_url", widget: "string"}

      - label: "Région"
        name: "region"
        file: "_data/region.json"
        fields:
          - {label: "Titre (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre (AR)", name: "section_title_ar", widget: "string", required: false}
          - {label: "Description 1 (FR)", name: "description1_fr", widget: "text"}
          - {label: "Description 1 (AR)", name: "description1_ar", widget: "text", required: false}
          - {label: "Description 2 (FR)", name: "description2_fr", widget: "text"}
          - {label: "Description 2 (AR)", name: "description2_ar", widget: "text", required: false}
          - label: "Provinces"
            name: "provinces"
            widget: "list"
            field: {label: "Nom", name: "nom", widget: "string"}

      - label: "Liens Utiles"
        name: "liens"
        file: "_data/liens.json"
        fields:
          - {label: "Titre de section (FR)", name: "section_title_fr", widget: "string"}
          - {label: "Titre de section (AR)", name: "section_title_ar", widget: "string", required: false}
          - label: "Liens"
            name: "items"
            widget: "list"
            fields:
              - {label: "Icône FontAwesome", name: "icon", widget: "string"}
              - {label: "Nom (FR)", name: "title_fr", widget: "string"}
              - {label: "Nom (AR)", name: "title_ar", widget: "string", required: false}
              - {label: "URL", name: "url", widget: "string"}
